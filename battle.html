<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dungeon Battle - New Enemy & Parry</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; }
        #controls { 
            position: fixed; bottom: 20px; width: 100%; 
            display: flex; justify-content: space-between; 
            padding: 0 30px; box-sizing: border-box; z-index: 10;
            pointer-events: none;
        }
        .btn { 
            width: 60px; height: 60px; background: rgba(255,255,255,0.15); 
            border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1rem; pointer-events: auto; cursor: pointer;
            backdrop-filter: blur(5px); font-weight: bold;
        }
        .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="controls">
        <div style="display:flex; gap:10px;">
            <div class="btn" id="left-btn">LEFT</div>
            <div class="btn" id="right-btn">RIGHT</div>
        </div>
        <div style="display:flex; gap:10px;">
            <div class="btn" id="jump-btn">JUMP</div>
            <div class="btn" id="sword-btn" style="background:rgba(255,0,0,0.5)">K</div>
            <div class="btn" id="shoot-btn" style="background:rgba(0,255,0,0.3)">O</div>
            <div class="btn" id="shield-btn" style="background:rgba(255,215,0,0.5); color:black">M</div>
        </div>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            physics: { default: 'arcade', arcade: { gravity: { y: 2200 }, debug: false } },
            scene: { create: create, update: update }
        };

        let player, enemyArcher, enemyMelee, platforms, arrows, enemyArrows, cursors, keys, hpBarPlayer, hpBarArcher, hpBarMelee;
        let playerHP = 100, archerHP = 100, meleeHP = 100;
        let moveLeft = false, moveRight = false, isFacingRight = true;
        let canDoubleJump = false, isShielding = false;
        
        let archerState = 'PATROL', meleeState = 'PATROL';
        let nextArcherFire = 0, nextMeleeAttack = 0;
        const ENEMY_SPEED = 120;

        new Phaser.Game(config);

        function create() {
            const scene = this;
            const worldWidth = 3000;
            this.physics.world.setBounds(0, 0, worldWidth, window.innerHeight);

            platforms = this.physics.add.staticGroup();
            createPlatform(this, worldWidth/2, window.innerHeight - 20, worldWidth, 40);
            createPlatform(this, 400, 450, 200, 30);
            createPlatform(this, 1000, 480, 250, 30);
            createPlatform(this, 2000, 450, 300, 30);

            // Player
            player = this.add.rectangle(100, 400, 45, 65, 0x00ff00);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
            this.physics.add.collider(player, platforms);

            // Enemy 1: Archer (Red)
            enemyArcher = this.add.rectangle(1200, 400, 45, 65, 0xff0000);
            this.physics.add.existing(enemyArcher);
            enemyArcher.body.setCollideWorldBounds(true);
            this.physics.add.collider(enemyArcher, platforms);

            // Enemy 2: Melee (Blue)
            enemyMelee = this.add.rectangle(2200, 400, 45, 65, 0x0000ff);
            this.physics.add.existing(enemyMelee);
            enemyMelee.body.setCollideWorldBounds(true);
            this.physics.add.collider(enemyMelee, platforms);

            this.cameras.main.setBounds(0, 0, worldWidth, window.innerHeight);
            this.cameras.main.startFollow(player, true, 0.1, 0.1);

            arrows = this.physics.add.group();
            enemyArrows = this.physics.add.group();

            cursors = this.input.keyboard.createCursorKeys();
            keys = this.input.keyboard.addKeys('W,A,S,D,K,O,M');

            setupButton('left-btn', () => moveLeft = true, () => moveLeft = false);
            setupButton('right-btn', () => moveRight = true, () => moveRight = false);
            document.getElementById('jump-btn').onpointerdown = () => handleJump();
            document.getElementById('sword-btn').onpointerdown = () => handleSword(scene);
            document.getElementById('shoot-btn').onpointerdown = () => handleShoot(scene);
            document.getElementById('shield-btn').onpointerdown = () => handleShield(scene);

            // Damage Overlaps
            this.physics.add.overlap(arrows, [enemyArcher, enemyMelee], (arr, en) => {
                if (en === enemyArcher) archerHP -= 5;
                if (en === enemyMelee) meleeHP -= 5;
                arr.destroy();
            });

            this.physics.add.overlap(enemyArrows, player, (pl, arr) => {
                arr.destroy();
                if (!isShielding) playerHP -= 10;
            });

            hpBarPlayer = this.add.graphics().setScrollFactor(0);
            hpBarArcher = this.add.graphics();
            hpBarMelee = this.add.graphics();
        }

        function createPlatform(scene, x, y, w, h) {
            const p = scene.add.rectangle(x, y, w, h, 0x6a0dad);
            p.setStrokeStyle(3, 0xffd700);
            platforms.add(p);
        }

        function setupButton(id, start, end) {
            const btn = document.getElementById(id);
            btn.onpointerdown = start; btn.onpointerup = end; btn.onpointerout = end;
        }

        function handleJump() {
            if (player.body.touching.down) {
                player.body.setVelocityY(-850);
                canDoubleJump = true;
            } else if (canDoubleJump) {
                player.body.setVelocityY(-800);
                canDoubleJump = false;
            }
        }

        function handleSword(scene) {
            if (isShielding) return;
            const range = isFacingRight ? 60 : -60;
            const hitbox = scene.add.rectangle(player.x + range, player.y, 60, 30, 0xff0000, 0.5);
            scene.physics.add.existing(hitbox);
            hitbox.body.setAllowGravity(false);
            
            [enemyArcher, enemyMelee].forEach(en => {
                if (en.active && Phaser.Geom.Intersects.RectangleToRectangle(hitbox.getBounds(), en.getBounds())) {
                    if (en === enemyArcher) archerHP -= 10;
                    if (en === enemyMelee) meleeHP -= 10;
                }
            });
            scene.time.delayedCall(100, () => hitbox.destroy());
        }

        function handleShoot(scene) {
            if (isShielding) return;
            const arrow = scene.add.rectangle(player.x, player.y, 25, 6, 0xffff00);
            arrows.add(arrow);
            arrow.body.setAllowGravity(false);
            arrow.body.setVelocityX(isFacingRight ? 900 : -900);
            scene.time.delayedCall(1500, () => arrow.destroy());
        }

        function handleShield(scene) {
            if (isShielding) return;
            isShielding = true;
            const shieldX = isFacingRight ? 35 : -35;
            const shieldVisual = scene.add.rectangle(player.x + shieldX, player.y, 15, 75, 0xffff00, 0.6);
            
            // الدرع يختفي بسرعة البرق (100ms) مثل السيف
            scene.time.delayedCall(100, () => { isShielding = false; shieldVisual.destroy(); });
        }

        function update() {
            const scene = this;

            // Player Movement
            if (cursors.left.isDown || keys.A.isDown || moveLeft) {
                player.body.setVelocityX(-350); isFacingRight = false;
            } else if (cursors.right.isDown || keys.D.isDown || moveRight) {
                player.body.setVelocityX(350); isFacingRight = true;
            } else { player.body.setVelocityX(0); }

            if (Phaser.Input.Keyboard.JustDown(keys.W) || Phaser.Input.Keyboard.JustDown(cursors.up)) handleJump();
            if (Phaser.Input.Keyboard.JustDown(keys.K)) handleSword(this);
            if (Phaser.Input.Keyboard.JustDown(keys.O)) handleShoot(this);
            if (Phaser.Input.Keyboard.JustDown(keys.M)) handleShield(this);

            // --- Enemy AI: Archer (Red) ---
            updateEnemyAI(scene, enemyArcher, archerHP, 'ARCHER');
            
            // --- Enemy AI: Melee (Blue) ---
            updateEnemyAI(scene, enemyMelee, meleeHP, 'MELEE');

            // UI
            drawHP(hpBarPlayer, 20, 20, playerHP, true);
            if(enemyArcher.active) drawHP(hpBarArcher, enemyArcher.x - 25, enemyArcher.y - 60, archerHP, false);
            if(enemyMelee.active) drawHP(hpBarMelee, enemyMelee.x - 25, enemyMelee.y - 60, meleeHP, false);
        }

        function updateEnemyAI(scene, en, hp, type) {
            if (!en.active || hp <= 0) { en.destroy(); return; }
            
            const dist = Phaser.Math.Distance.Between(player.x, player.y, en.x, en.y);
            const vDist = Math.abs(player.y - en.y);

            if (type === 'ARCHER') {
                if (dist < 400 && vDist < 100) {
                    if (dist < 200) en.body.setVelocityX(player.x > en.x ? -ENEMY_SPEED : ENEMY_SPEED);
                    else if (dist > 300) en.body.setVelocityX(player.x > en.x ? ENEMY_SPEED : -ENEMY_SPEED);
                    else {
                        en.body.setVelocityX(0);
                        if (scene.time.now > nextArcherFire) {
                            fireEnemyArrow(scene, en);
                            nextArcherFire = scene.time.now + 2000;
                        }
                    }
                } else en.body.setVelocityX(en.x > 1400 ? -ENEMY_SPEED : ENEMY_SPEED);
            } else {
                // MELEE AI (Blue)
                if (dist < 500 && vDist < 100) {
                    en.body.setVelocityX(player.x > en.x ? ENEMY_SPEED + 20 : -ENEMY_SPEED - 20);
                    if (dist < 60 && scene.time.now > nextMeleeAttack) {
                        performMeleeAttack(scene, en);
                        nextMeleeAttack = scene.time.now + 1000;
                    }
                } else en.body.setVelocityX(en.x > 2400 ? -ENEMY_SPEED : ENEMY_SPEED);
            }
        }

        function fireEnemyArrow(scene, en) {
            const arr = scene.add.rectangle(en.x, en.y, 20, 5, 0xff0000);
            enemyArrows.add(arr);
            arr.body.setAllowGravity(false);
            arr.body.setVelocityX(player.x > en.x ? 500 : -500);
            scene.time.delayedCall(2000, () => arr.destroy());
        }

        function performMeleeAttack(scene, en) {
            const hit = scene.add.rectangle(en.x + (player.x > en.x ? 40 : -40), en.y, 40, 20, 0x0000ff, 0.5);
            if (Phaser.Geom.Intersects.RectangleToRectangle(hit.getBounds(), player.getBounds())) {
                if (!isShielding) playerHP -= 15;
            }
            scene.time.delayedCall(100, () => hit.destroy());
        }

        function drawHP(graphics, x, y, hp, isStatic) {
            graphics.clear();
            graphics.fillStyle(0x000000);
            graphics.fillRect(x, y, 100, 10);
            graphics.fillStyle(hp > 30 ? 0x00ff00 : 0xff0000);
            graphics.fillRect(x, y, Math.max(0, (hp / 100) * 100), 10);
        }
    </script>
</body>
</html>
