<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dungeon Battle - Pro Prototype</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; }
        #controls { 
            position: fixed; bottom: 20px; width: 100%; 
            display: flex; justify-content: space-between; 
            padding: 0 30px; box-sizing: border-box; z-index: 10;
            pointer-events: none;
        }
        .btn { 
            width: 70px; height: 70px; background: rgba(255,255,255,0.15); 
            border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; pointer-events: auto; cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="controls">
        <div style="display:flex; gap:15px;">
            <div class="btn" id="left-btn">◀</div>
            <div class="btn" id="right-btn">▶</div>
        </div>
        <div style="display:flex; gap:15px;">
            <div class="btn" id="jump-btn">▲</div>
            <div class="btn" id="sword-btn" style="background:rgba(255,0,0,0.5)">⚔️</div>
            <div class="btn" id="shoot-btn" style="background:rgba(255,215,0,0.5); color:black">🏹</div>
        </div>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            physics: { 
                default: 'arcade', 
                arcade: { gravity: { y: 1400 }, debug: false } 
            },
            scene: { create: create, update: update }
        };

        let player, enemy, platforms, arrows, cursors, wasd, hpBarPlayer, hpBarEnemy;
        let playerHP = 100, enemyHP = 100;
        let moveLeft = false, moveRight = false, doJump = false;
        let isFacingRight = true;
        let canDoubleJump = false; // نظام القفز المزدوج

        new Phaser.Game(config);

        function create() {
            const scene = this;

            // 1. إعداد حدود العالم (خريطة عريضة جداً)
            const worldWidth = 3000;
            const worldHeight = window.innerHeight;
            this.physics.world.setBounds(0, 0, worldWidth, worldHeight);

            // 2. تصميم المنصات (بألوان واضحة)
            platforms = this.physics.add.staticGroup();
            
            // الأرضية
            createPlatform(this, worldWidth/2, worldHeight - 20, worldWidth, 40);
            
            // منصات عشوائية في الخريطة
            createPlatform(this, 400, 450, 250, 30);
            createPlatform(this, 800, 300, 250, 30);
            createPlatform(this, 1200, 450, 300, 30);
            createPlatform(this, 1600, 350, 200, 30);
            createPlatform(this, 2100, 450, 400, 30);
            createPlatform(this, 2600, 300, 300, 30);

            // 3. اللاعب (الأخضر)
            player = this.add.rectangle(100, 400, 45, 65, 0x00ff00);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
            this.physics.add.collider(player, platforms);

            // 4. العدو (الأحمر)
            enemy = this.add.rectangle(1200, 400, 45, 65, 0xff0000);
            this.physics.add.existing(enemy);
            enemy.body.setCollideWorldBounds(true);
            this.physics.add.collider(enemy, platforms);

            // 5. الكاميرا (تلاحق اللاعب)
            this.cameras.main.setBounds(0, 0, worldWidth, worldHeight);
            this.cameras.main.startFollow(player, true, 0.1, 0.1);

            // 6. السهام
            arrows = this.physics.add.group();

            // 7. عدادات الدم
            hpBarPlayer = this.add.graphics().setScrollFactor(0); // ثابتة في الشاشة
            hpBarEnemy = this.add.graphics();

            // 8. التحكم (WASD + Arrows)
            cursors = this.input.keyboard.createCursorKeys();
            wasd = this.input.keyboard.addKeys('W,A,S,D');

            // أزرار الموبايل
            setupButton('left-btn', () => moveLeft = true, () => moveLeft = false);
            setupButton('right-btn', () => moveRight = true, () => moveRight = false);
            
            // القفز (لمسة واحدة للقفزة)
            document.getElementById('jump-btn').onpointerdown = () => handleJump();
            
            document.getElementById('sword-btn').onpointerdown = () => attackMelee(scene);
            document.getElementById('shoot-btn').onpointerdown = () => fireArrow(scene);

            // التصادم
            this.physics.add.overlap(arrows, enemy, (en, arr) => {
                arr.destroy();
                enemyHP -= 5;
            });
        }

        function createPlatform(scene, x, y, w, h) {
            const p = scene.add.rectangle(x, y, w, h, 0x6a0dad); // لون أرجواني
            p.setStrokeStyle(3, 0xffd700); // حواف ذهبية
            platforms.add(p);
        }

        function setupButton(id, start, end) {
            const btn = document.getElementById(id);
            btn.onpointerdown = start; btn.onpointerup = end; btn.onpointerout = end;
        }

        function handleJump() {
            if (player.body.touching.down) {
                player.body.setVelocityY(-650);
                canDoubleJump = true;
            } else if (canDoubleJump) {
                player.body.setVelocityY(-600);
                canDoubleJump = false;
            }
        }

        function attackMelee(scene) {
            const range = isFacingRight ? 60 : -60;
            const hitbox = scene.add.rectangle(player.x + range, player.y, 60, 30, 0xff0000, 0.4);
            scene.physics.add.existing(hitbox);
            hitbox.body.setAllowGravity(false);
            if (Phaser.Geom.Intersects.RectangleToRectangle(hitbox.getBounds(), enemy.getBounds())) {
                enemyHP -= 10;
            }
            scene.time.delayedCall(100, () => hitbox.destroy());
        }

        function fireArrow(scene) {
            const arrow = scene.add.rectangle(player.x, player.y, 25, 6, 0xffff00);
            arrows.add(arrow);
            arrow.body.setAllowGravity(false);
            arrow.body.setVelocityX(isFacingRight ? 700 : -700);
            scene.time.delayedCall(1500, () => arrow.destroy());
        }

        function update() {
            const scene = this;

            // حركة اللاعب
            if (cursors.left.isDown || wasd.A.isDown || moveLeft) {
                player.body.setVelocityX(-300); isFacingRight = false;
            } else if (cursors.right.isDown || wasd.D.isDown || moveRight) {
                player.body.setVelocityX(300); isFacingRight = true;
            } else { player.body.setVelocityX(0); }

            // القفز بالكيبورد (JustDown لمنع القفز المستمر)
            if (Phaser.Input.Keyboard.JustDown(wasd.W) || Phaser.Input.Keyboard.JustDown(cursors.up)) {
                handleJump();
            }

            // ذكاء اصطناعي للعدو
            if (enemy.active && enemyHP > 0) {
                const dist = player.x - enemy.x;
                if (Math.abs(dist) < 500) { // يطاردك إذا اقتربت
                    enemy.body.setVelocityX(dist > 0 ? 120 : -120);
                }
            } else if (enemy.active) {
                enemy.destroy();
            }

            // تحديث عدادات الدم
            drawHP(hpBarPlayer, 20, 20, playerHP, true); // ثابتة في الزاوية
            if(enemy.active) drawHP(hpBarEnemy, enemy.x - 25, enemy.y - 60, enemyHP, false);
            else hpBarEnemy.clear();
        }

        function drawHP(graphics, x, y, hp, isStatic) {
            graphics.clear();
            const drawX = isStatic ? x : x;
            const drawY = isStatic ? y : y;
            
            graphics.fillStyle(0x000000);
            graphics.fillRect(drawX, drawY, 100, 10);
            graphics.fillStyle(hp > 30 ? 0x00ff00 : 0xff0000);
            graphics.fillRect(drawX, drawY, (hp / 100) * 100, 10);
        }
    </script>
</body>
</html>
