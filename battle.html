<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dungeon Battle - Arena</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #controls { 
            position: fixed; bottom: 20px; width: 100%; 
            display: flex; justify-content: space-between; 
            padding: 0 30px; box-sizing: border-box; z-index: 10;
            pointer-events: none; /* لكي لا يحجب الأزرار عن اللعبة */
        }
        .btn { 
            width: 70px; height: 70px; background: rgba(255,255,255,0.2); 
            border: 2px solid #fff; border-radius: 50%; color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; pointer-events: auto; cursor: pointer;
            user-select: none;
        }
        .btn:active { background: rgba(255,255,255,0.5); transform: scale(0.9); }
    </style>
</head>
<body>
    <!-- أزرار التحكم (تعمل بالماوس واللمس) -->
    <div id="controls">
        <div style="display:flex; gap:15px;">
            <div class="btn" id="left-btn">◀</div>
            <div class="btn" id="right-btn">▶</div>
        </div>
        <div style="display:flex; gap:15px;">
            <div class="btn" id="jump-btn">▲</div>
            <div class="btn" id="sword-btn" style="background:red">⚔️</div>
        </div>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            physics: { default: 'arcade', arcade: { gravity: { y: 1200 } } },
            scene: { create: create, update: update }
        };

        let player, platforms, wasd, cursors;
        let moveLeft = false, moveRight = false, doJump = false;

        new Phaser.Game(config);

        function create() {
            const scene = this;

            // 1. الأرضية والمنصات
            platforms = this.physics.add.staticGroup();
            platforms.add(this.add.rectangle(window.innerWidth/2, window.innerHeight-20, window.innerWidth, 40, 0x333333));
            platforms.add(this.add.rectangle(400, 450, 200, 20, 0x666666));
            platforms.add(this.add.rectangle(700, 300, 200, 20, 0x666666));

            // 2. اللاعب (الكبسولة الخضراء)
            player = this.add.rectangle(100, 100, 40, 60, 0x00ff00);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
            this.physics.add.collider(player, platforms);

            // 3. إعداد الكيبورد (WASD + Arrows)
            cursors = this.input.keyboard.createCursorKeys();
            wasd = this.input.keyboard.addKeys('W,A,S,D');

            // 4. برمجة الأزرار (PointerDown للماوس واللمس معاً)
            setupButton('left-btn', () => moveLeft = true, () => moveLeft = false);
            setupButton('right-btn', () => moveRight = true, () => moveRight = false);
            setupButton('jump-btn', () => doJump = true, () => doJump = false);
            
            // زر السيف
            document.getElementById('sword-btn').onpointerdown = () => {
                const sword = scene.add.rectangle(player.x + (player.body.velocity.x >= 0 ? 40 : -40), player.y, 40, 20, 0xff0000);
                scene.time.delayedCall(100, () => sword.destroy());
            };
        }

        function setupButton(id, startFn, endFn) {
            const btn = document.getElementById(id);
            btn.onpointerdown = startFn;
            btn.onpointerup = endFn;
            btn.onpointerout = endFn; // إذا خرج الماوس من الزر يتوقف التحرك
        }

        function update() {
            // منطق الحركة (يدعم الكيبورد والماوس واللمس)
            if (cursors.left.isDown || wasd.A.isDown || moveLeft) {
                player.body.setVelocityX(-250);
            } else if (cursors.right.isDown || wasd.D.isDown || moveRight) {
                player.body.setVelocityX(250);
            } else {
                player.body.setVelocityX(0);
            }

            // منطق القفز
            if ((cursors.up.isDown || wasd.W.isDown || doJump) && player.body.touching.down) {
                player.body.setVelocityY(-600);
                doJump = false;
            }
        }
    </script>
</body>
</html>
