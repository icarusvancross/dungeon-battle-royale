<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dungeon Battle Royale - Prototype</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        :root { --gold: #ffd700; --lava: #ff4500; --dark: #050505; }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* Lobby Styles */
        #lobby-ui { 
            position: fixed; inset: 0; background: radial-gradient(circle, #222, #000);
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-play { 
            background: var(--lava); color: white; padding: 20px 60px; 
            border: 3px solid white; font-size: 2rem; cursor: pointer; font-weight: bold;
            box-shadow: 0 0 20px var(--lava);
        }

        /* Game Container */
        #game-container { display: none; width: 100vw; height: 100vh; }
        
        /* Mobile Controls */
        #mobile-controls {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            display: none; justify-content: space-between; z-index: 200;
        }
        .control-btn { 
            width: 70px; height: 70px; background: rgba(255,255,255,0.2); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: white; border: 2px solid #fff;
        }
    </style>
</head>
<body>

    <!-- Lobby UI -->
    <div id="lobby-ui">
        <h1 style="color: var(--gold); font-size: 3rem; margin-bottom: 50px;">DUNGEON PROTOTYPE</h1>
        <button class="btn-play" onclick="startBattle()">START BATTLE</button>
        <p style="color: #888; margin-top: 20px;">Controls: WASD to Move | SPACE to Sword | F to Shoot</p>
    </div>

    <!-- Game Container -->
    <div id="game-container"></div>

    <!-- Mobile Controls -->
    <div id="mobile-controls">
        <div style="display: flex; gap: 10px;">
            <div class="control-btn" id="btn-left">◀</div>
            <div class="control-btn" id="btn-right">▶</div>
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="control-btn" id="btn-jump">▲</div>
            <div class="control-btn" id="btn-sword" style="background: var(--lava);">⚔️</div>
            <div class="control-btn" id="btn-shoot" style="background: var(--gold); color: black;">🏹</div>
        </div>
    </div>

    <script>
        // --- Game Logic (Phaser) ---
        let player;
        let cursors;
        let platforms;
        let arrows;
        let isFacingRight = true;

        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: window.innerWidth,
            height: window.innerHeight,
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 1000 }, debug: false }
            },
            scene: { preload: preload, create: create, update: update }
        };

        function preload() {
            // No assets needed for prototype, we use graphics
        }

        function create() {
            const scene = this;
            
            // 1. Create Platforms
            platforms = this.physics.add.staticGroup();
            const ground = this.add.rectangle(window.innerWidth/2, window.innerHeight - 20, window.innerWidth, 40, 0x333333);
            platforms.add(ground);
            
            // Add some random platforms
            platforms.create(400, 400, null).setDisplaySize(200, 20).setOrigin(0).setRectangle(200, 20).setFillStyle(0x555555);
            platforms.create(100, 250, null).setDisplaySize(200, 20).setOrigin(0).setRectangle(200, 20).setFillStyle(0x555555);

            // 2. Create Player (Capsule)
            player = this.add.rectangle(100, 450, 40, 60, 0x00ff00);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
            this.physics.add.collider(player, platforms);

            // 3. Arrows Group
            arrows = this.physics.add.group();

            // 4. Controls
            cursors = this.input.keyboard.createCursorKeys();
            this.input.keyboard.on('keydown-SPACE', () => swordAttack(scene));
            this.input.keyboard.on('keydown-F', () => shootArrow(scene));

            // Mobile Button Events
            setupMobileControls(scene);
        }

        function update() {
            const speed = 200;
            if (cursors.left.isDown || window.moveLeft) {
                player.body.setVelocityX(-speed);
                isFacingRight = false;
            } else if (cursors.right.isDown || window.moveRight) {
                player.body.setVelocityX(speed);
                isFacingRight = true;
            } else {
                player.body.setVelocityX(0);
            }

            if ((cursors.up.isDown || window.doJump) && player.body.touching.down) {
                player.body.setVelocityY(-500);
                window.doJump = false;
            }
        }

        function swordAttack(scene) {
            const offsetX = isFacingRight ? 40 : -40;
            const swordHitbox = scene.add.rectangle(player.x + offsetX, player.y, 40, 20, 0xff0000);
            scene.physics.add.existing(swordHitbox);
            swordHitbox.body.setAllowGravity(false);
            
            // Sword animation (disappear after 100ms)
            scene.time.delayedCall(100, () => swordHitbox.destroy());
        }

        function shootArrow(scene) {
            const arrow = scene.add.circle(player.x, player.y, 5, 0xffff00);
            scene.physics.add.existing(arrow);
            arrow.body.setAllowGravity(false);
            const velocity = isFacingRight ? 500 : -500;
            arrow.body.setVelocityX(velocity);
            
            // Destroy arrow after 2 seconds
            scene.time.delayedCall(2000, () => arrow.destroy());
        }

        // --- UI Functions ---
        function startBattle() {
            document.getElementById('lobby-ui').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            if(window.innerWidth < 1000) document.getElementById('mobile-controls').style.display = 'flex';
            
            new Phaser.Game(config);
        }

        function setupMobileControls(scene) {
            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');
            const btnJump = document.getElementById('btn-jump');
            const btnSword = document.getElementById('btn-sword');
            const btnShoot = document.getElementById('btn-shoot');

            btnLeft.ontouchstart = () => window.moveLeft = true;
            btnLeft.ontouchend = () => window.moveLeft = false;
            btnRight.ontouchstart = () => window.moveRight = true;
            btnRight.ontouchend = () => window.moveRight = false;
            btnJump.ontouchstart = () => window.doJump = true;
            btnSword.ontouchstart = () => swordAttack(scene);
            btnShoot.ontouchstart = () => shootArrow(scene);
        }
    </script>
</body>
</html>
