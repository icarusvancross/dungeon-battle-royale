<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dungeon Battle Royale</title>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #ffd700; --lava: #ff4500; --dark: #050505; }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }

        body { 
            margin: 0; background: var(--dark); color: white; 
            font-family: 'Arial Black', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw;
            position: fixed; /* منع السكرول نهائياً */
        }

        /* Portrait Warning */
        @media screen and (orientation: portrait) {
            #rotate-device { display: flex !important; }
        }
        #rotate-device {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Auth Screen */
        #auth-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #222, #000);
            z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .auth-box { 
            background: rgba(255,255,255,0.05); padding: 25px; 
            border-radius: 15px; border: 1px solid var(--gold); 
            text-align: center; width: 90%; max-width: 400px; 
        }
        .input-field { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #444; color: white; border-radius: 5px; }
        
        /* Lobby Layout with Safe Area (Notch Support) */
        #lobby-ui { 
            display: none; height: 100vh; width: 100vw;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            display: none; grid-template-columns: 1fr 2fr 1fr; grid-template-rows: 60px 1fr 80px;
        }

        .top-left { grid-area: 1 / 1; padding: 10px; }
        .top-right { grid-area: 1 / 3; display: flex; flex-direction: column; align-items: flex-end; padding: 10px; }
        .center-stage { grid-area: 2 / 2; display: flex; align-items: center; justify-content: center; position: relative; }
        .side-menu { grid-area: 2 / 3; display: flex; flex-direction: column; gap: 8px; justify-content: center; padding-right: 20px; }
        .bottom-bar { grid-area: 3 / 1 / 3 / 4; display: flex; justify-content: space-between; align-items: flex-end; padding: 10px 20px; }

        .profile-card { background: rgba(0,0,0,0.7); padding: 8px 15px; border-left: 4px solid var(--gold); }
        .coin-display { background: #111; color: var(--gold); padding: 6px 15px; border: 1px solid var(--gold); border-radius: 20px; font-weight: bold; }
        
        .hero-platform { width: 140px; height: 15px; background: var(--lava); filter: blur(12px); position: absolute; bottom: 40px; border-radius: 50%; opacity: 0.6; }
        .character { font-size: 7rem; z-index: 2; animation: breathe 3s ease-in-out infinite; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        
        @keyframes breathe { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.03); } }

        .btn-main { background: var(--lava); color: white; padding: 12px 50px; border: 2px solid white; cursor: pointer; font-size: 1.3rem; font-weight: bold; box-shadow: 0 0 15px var(--lava); }
        .btn-side { background: rgba(0,0,0,0.6); color: white; padding: 10px; border: 1px solid #555; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .btn-auth { background: var(--gold); color: black; padding: 12px; border: none; cursor: pointer; font-weight: bold; margin: 5px; width: 45%; }
        .guest-link { color: #aaa; text-decoration: underline; cursor: pointer; font-size: 0.85rem; display: block; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- Orientation Warning -->
    <div id="rotate-device">
        <span style="font-size: 3rem;">📱🔄</span>
        <p style="letter-spacing: 2px;">PLEASE ROTATE TO LANDSCAPE</p>
    </div>

    <!-- Auth Screen -->
    <div id="auth-screen">
        <h1 style="color: var(--gold); letter-spacing: 4px; text-shadow: 0 0 10px var(--lava);">DUNGEON BATTLE ROYALE</h1>
        <div class="auth-box">
            <input type="email" id="email" class="input-field" placeholder="Email Address">
            <input type="password" id="password" class="input-field" placeholder="Password">
            <div style="display: flex; justify-content: center;">
                <button class="btn-auth" onclick="handleAuth('signup')">SIGN UP</button>
                <button class="btn-auth" onclick="handleAuth('login')" style="background:white">LOGIN</button>
            </div>
            <span class="guest-link" onclick="startGuest()">Play as Guest (No Progress Saved)</span>
        </div>
    </div>

    <!-- Main Lobby UI -->
    <div id="lobby-ui">
        <div class="top-left">
            <div class="profile-card">
                <div id="user-name" style="font-size: 1.1rem;">PLAYER</div>
                <div style="font-size: 0.6rem; color: var(--gold); letter-spacing: 1px;">LVL 1 WARRIOR</div>
            </div>
        </div>

        <div class="top-right">
            <div class="coin-display">🪙 <span id="user-coins">0</span></div>
        </div>

        <div class="center-stage">
            <div class="character">🛡️</div>
            <div class="hero-platform"></div>
        </div>

        <div class="side-menu">
            <button class="btn-side">Warehouse</button>
            <button class="btn-side">Lucky Wheel</button>
            <button class="btn-side">Shop</button>
            <button class="btn-side">Settings</button>
        </div>

        <div class="bottom-bar">
            <div style="background: rgba(0,0,0,0.6); padding: 8px; font-size: 0.7rem; border-radius: 5px; max-width: 250px; color: #ccc;">
                SYSTEM: Welcome to the Arena, Warrior!
            </div>
            <button class="btn-main" onclick="alert('Searching for Match...')">BATTLE</button>
        </div>
    </div>

    <script>
        // --- Supabase Config ---
        const SB_URL = "https://qcgcyqvrfvkajbqlszbp.supabase.co";
        const SB_KEY = "sb_publishable_juEni3P1axAVBjMLrihkWw_pYmLGvEy";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        // Fullscreen Function for Mobile
        function requestFullScreen() {
            const el = document.documentElement;
            const rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
            if (rfs) rfs.call(el);
        }

        async function handleAuth(type) {
            requestFullScreen(); // Go Fullscreen
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if(!email || !password) return alert("Please enter credentials");

            let result;
            if(type === 'signup') {
                result = await _supabase.auth.signUp({ email, password });
                if(!result.error && result.data.user) {
                    await _supabase.from('profiles').insert([{ id: result.data.user.id, username: 'Warrior', silver_coins: 500 }]);
                    alert("Account Created! 500 Coins added.");
                }
            } else {
                result = await _supabase.auth.signInWithPassword({ email, password });
            }

            if(result.error) alert(result.error.message);
            else loadLobby(result.data.user.id);
        }

        function startGuest() {
            requestFullScreen(); // Go Fullscreen
            document.getElementById('user-name').innerText = "GUEST_" + Math.floor(Math.random()*999);
            document.getElementById('user-coins').innerText = "0";
            showLobby();
        }

        async function loadLobby(userId) {
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', userId).single();
            if(profile) {
                document.getElementById('user-name').innerText = profile.username;
                document.getElementById('user-coins').innerText = profile.silver_coins;
                showLobby();
            }
        }

        function showLobby() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('lobby-ui').style.display = 'grid';
        }

        // Check login on load
        window.onload = async () => {
            const { data } = await _supabase.auth.getUser();
            if(data.user) loadLobby(data.user.id);
        };
    </script>
</body>
</html>
