<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dungeon Battle Royale - Lobby</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #ffd700; --lava: #ff4500; --dark: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; height: 100vh; width: 100vw; position: fixed; }
        #rotate-device { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        @media screen and (orientation: portrait) { #rotate-device { display: flex !important; } }
        #auth-screen { position: fixed; inset: 0; background: radial-gradient(circle, #222, #000); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .auth-box { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; border: 1px solid var(--gold); text-align: center; width: 90%; max-width: 400px; }
        .input-field { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #444; color: white; border-radius: 5px; }
        #lobby-ui { display: none; height: 100vh; width: 100vw; padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px; grid-template-columns: 1fr 2fr 1fr; grid-template-rows: 60px 1fr 80px; }
        .top-left { grid-area: 1 / 1; padding: 10px; }
        .top-right { grid-area: 1 / 3; display: flex; align-items: flex-start; justify-content: flex-end; padding: 10px; gap: 10px; }
        .center-stage { grid-area: 2 / 2; display: flex; align-items: center; justify-content: center; position: relative; }
        .character { font-size: 7rem; z-index: 2; animation: breathe 3s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.03); } }
        .side-menu { grid-area: 2 / 3; display: flex; flex-direction: column; gap: 8px; justify-content: center; }
        .bottom-bar { grid-area: 3 / 1 / 3 / 4; display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 10px; }
        .btn-main { background: var(--lava); color: white; padding: 12px 50px; border: 2px solid white; cursor: pointer; font-size: 1.3rem; font-weight: bold; box-shadow: 0 0 15px var(--lava); }
        .btn-side { background: rgba(0,0,0,0.6); color: white; padding: 10px; border: 1px solid #555; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .btn-auth { background: var(--gold); color: black; padding: 12px; border: none; cursor: pointer; font-weight: bold; width: 45%; margin: 5px; }
        .stat-box { background: #111; color: var(--gold); padding: 6px 15px; border: 1px solid var(--gold); border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; }
    </style>
</head>
<body>
    <div id="rotate-device"><span>📱🔄</span><p>PLEASE ROTATE TO LANDSCAPE</p></div>
    <div id="auth-screen">
        <h1 style="color: var(--gold); letter-spacing: 4px;">DUNGEON BATTLE</h1>
        <div class="auth-box">
            <input type="email" id="email" class="input-field" placeholder="Email">
            <input type="password" id="password" class="input-field" placeholder="Password">
            <div style="display: flex; justify-content: center;">
                <button class="btn-auth" onclick="handleAuth('signup')">SIGN UP</button>
                <button class="btn-auth" onclick="handleAuth('login')" style="background:white">LOGIN</button>
            </div>
            <span style="color:#aaa; cursor:pointer; display:block; margin-top:20px; text-decoration:underline;" onclick="startGuest()">Play as Guest</span>
        </div>
    </div>
    <div id="lobby-ui">
        <div class="top-left"><div style="background:rgba(0,0,0,0.7); padding:10px; border-left:4px solid var(--gold);"><div id="user-name">PLAYER</div><div style="font-size:0.6rem; color:var(--gold);">LVL 1 WARRIOR</div></div></div>
        <div class="top-right"><div class="stat-box">🪙 <span id="user-coins">0</span></div><div class="stat-box" onclick="toggleFS()">⛶</div></div>
        <div class="center-stage"><div class="character">🛡️</div></div>
        <div class="side-menu">
            <button class="btn-side">Warehouse</button>
            <button class="btn-side">Lucky Wheel</button>
            <button class="btn-side">Shop</button>
            <button class="btn-side">Settings</button>
        </div>
        <div class="bottom-bar">
            <div style="background:rgba(0,0,0,0.6); padding:8px; font-size:0.7rem; border-radius:5px; color:#ccc;">SYS: Ready for battle?</div>
            <!-- الزر الآن ينقلك فوراً لملف المعركة -->
            <button class="btn-main" onclick="location.href='battle.html'">BATTLE</button>
        </div>
    </div>
    <script>
        const SB_URL = "https://qcgcyqvrfvkajbqlszbp.supabase.co";
        const SB_KEY = "sb_publishable_juEni3P1axAVBjMLrihkWw_pYmLGvEy";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }
        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            let res = (type === 'signup') ? await _supabase.auth.signUp({email, password}) : await _supabase.auth.signInWithPassword({email, password});
            if(res.error) alert(res.error.message);
            else {
                if(type === 'signup') await _supabase.from('profiles').insert([{ id: res.data.user.id, username: 'Warrior', silver_coins: 500 }]);
                loadLobby(res.data.user.id);
            }
        }
        function startGuest() { document.getElementById('user-name').innerText = "GUEST"; showLobby(); }
        async function loadLobby(uid) {
            const { data } = await _supabase.from('profiles').select('*').eq('id', uid).single();
            if(data) { document.getElementById('user-name').innerText = data.username; document.getElementById('user-coins').innerText = data.silver_coins; showLobby(); }
        }
        function showLobby() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('lobby-ui').style.display = 'grid'; }
        window.onload = async () => { const { data } = await _supabase.auth.getUser(); if(data.user) loadLobby(data.user.id); };
    </script>
</body>
</html>
