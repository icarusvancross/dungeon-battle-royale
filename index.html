<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Dungeon Battle Royale</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #ffd700; --lava: #ff4500; --dark: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--dark); color: white; 
            font-family: 'Arial Black', sans-serif; overflow: hidden; 
            height: 100vh; width: 100vw;
        }

        /* Landscape Orientation Warning */
        @media screen and (orientation: portrait) {
            #rotate-device { display: flex !important; }
        }
        #rotate-device {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Gate / Auth Screen */
        #auth-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #222, #000);
            z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .auth-box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid var(--gold); text-align: center; width: 400px; }
        .input-field { width: 100%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #444; color: white; border-radius: 5px; }
        
        /* Professional Lobby Layout (Landscape) */
        #lobby-ui { display: none; height: 100vh; padding: 20px; grid-template-columns: 200px 1fr 200px; grid-template-rows: 80px 1fr 100px; }
        
        .top-left { grid-area: 1 / 1; }
        .top-right { grid-area: 1 / 3; display: flex; flex-direction: column; align-items: flex-end; }
        .center-stage { grid-area: 2 / 2; display: flex; align-items: center; justify-content: center; position: relative; }
        .side-menu { grid-area: 2 / 3; display: flex; flex-direction: column; gap: 10px; justify-content: center; }
        .bottom-bar { grid-area: 3 / 1 / 3 / 4; display: flex; justify-content: space-between; align-items: flex-end; }

        /* Styles for Buttons & Elements */
        .profile-card { background: rgba(0,0,0,0.6); padding: 10px; border-left: 4px solid var(--gold); }
        .coin-display { background: #111; color: var(--gold); padding: 5px 15px; border: 1px solid var(--gold); border-radius: 20px; font-size: 1.2rem; }
        .hero-platform { width: 150px; height: 20px; background: var(--lava); filter: blur(10px); position: absolute; bottom: 50px; border-radius: 50%; }
        .character { font-size: 8rem; z-index: 2; animation: breathe 3s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .btn-main { background: var(--lava); color: white; padding: 15px 60px; border: 2px solid white; cursor: pointer; font-size: 1.5rem; box-shadow: 0 0 20px var(--lava); }
        .btn-side { background: rgba(255,255,255,0.1); color: white; padding: 10px; border: 1px solid #444; cursor: pointer; text-transform: uppercase; }
        .btn-auth { background: var(--gold); color: black; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
        .guest-link { color: #888; text-decoration: underline; cursor: pointer; font-size: 0.8rem; display: block; margin-top: 15px; }
    </style>
</head>
<body>

    <!-- Orientation Warning -->
    <div id="rotate-device">
        <span style="font-size: 3rem;">📱🔄</span>
        <p>PLEASE ROTATE TO LANDSCAPE</p>
    </div>

    <!-- Auth Screen -->
    <div id="auth-screen">
        <h1 style="color: var(--gold); letter-spacing: 5px;">DUNGEON BATTLE ROYALE</h1>
        <div class="auth-box">
            <input type="email" id="email" class="input-field" placeholder="Email">
            <input type="password" id="password" class="input-field" placeholder="Password">
            <button class="btn-auth" onclick="handleAuth('signup')">SIGN UP (+500 🪙)</button>
            <button class="btn-auth" onclick="handleAuth('login')" style="background:white">LOGIN</button>
            <span class="guest-link" onclick="startGuest()">Play as Guest (No Save)</span>
        </div>
    </div>

    <!-- Main Lobby UI -->
    <div id="lobby-ui">
        <div class="top-left">
            <div class="profile-card">
                <div id="user-name">PLAYER</div>
                <div style="font-size: 0.7rem; color: #aaa;">LVL 1 WARRIOR</div>
            </div>
        </div>

        <div class="top-right">
            <div class="coin-display">🪙 <span id="user-coins">0</span></div>
        </div>

        <div class="center-stage">
            <div class="character">🛡️</div>
            <div class="hero-platform"></div>
        </div>

        <div class="side-menu">
            <button class="btn-side">Warehouse</button>
            <button class="btn-side">Lucky Wheel</button>
            <button class="btn-side">Shop</button>
            <button class="btn-side">Settings</button>
        </div>

        <div class="bottom-bar">
            <div style="background: rgba(0,0,0,0.5); padding: 5px; font-size: 0.7rem;">WORLD CHAT: Welcome to the dungeon!</div>
            <button class="btn-main" onclick="alert('Searching for Match...')">BATTLE</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://qcgcyqvrfvkajbqlszbp.supabase.co";
        const SB_KEY = "sb_publishable_juEni3P1axAVBjMLrihkWw_pYmLGvEy";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if(!email || !password) return alert("Please fill all fields");

            let result;
            if(type === 'signup') {
                result = await _supabase.auth.signUp({ email, password });
                if(!result.error) {
                    // Create Profile with 500 coins
                    const user = result.data.user;
                    await _supabase.from('profiles').insert([{ id: user.id, username: 'Warrior', silver_coins: 500 }]);
                    alert("Account Created! You got 500 Coins.");
                }
            } else {
                result = await _supabase.auth.signInWithPassword({ email, password });
            }

            if(result.error) alert(result.error.message);
            else loadLobby(result.data.user.id);
        }

        async function startGuest() {
            document.getElementById('user-name').innerText = "GUEST_" + Math.floor(Math.random()*999);
            document.getElementById('user-coins').innerText = "0";
            showLobby();
        }

        async function loadLobby(userId) {
            const { data: profile } = await _supabase.from('profiles').select('*').eq('id', userId).single();
            if(profile) {
                document.getElementById('user-name').innerText = profile.username;
                document.getElementById('user-coins').innerText = profile.silver_coins;
                showLobby();
            }
        }

        function showLobby() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('lobby-ui').style.display = 'grid';
        }

        // Auto-check if logged in
        window.onload = async () => {
            const { data } = await _supabase.auth.getUser();
            if(data.user) loadLobby(data.user.id);
        };
    </script>
</body>
</html>
